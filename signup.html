<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — StudyAI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#111111;--card:#161616;--border:#222222;--border2:#2a2a2a;
  --text:#ededed;--muted:#666666;--subtle:#333333;
  --accent:#7c6af7;--accent2:#a78bfa;--green:#34d399;--red:#f87171;
}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;position:relative;overflow:hidden;
}
.bg-glow{
  position:fixed;top:-20%;left:50%;transform:translateX(-50%);
  width:700px;height:500px;
  background:radial-gradient(ellipse at 50% 30%,rgba(124,106,247,0.1) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
.back-link{
  position:fixed;top:20px;left:24px;z-index:10;
  display:flex;align-items:center;gap:6px;
  color:var(--muted);text-decoration:none;font-size:0.82rem;font-weight:500;transition:color .18s;
}
.back-link:hover{color:var(--text)}
.back-link svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.card{
  background:var(--card);border:1px solid var(--border2);border-radius:16px;
  width:100%;max-width:400px;padding:36px 32px;
  position:relative;z-index:1;
  animation:slideUp .4s cubic-bezier(.16,1,.3,1) both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:28px;text-decoration:none}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-name{font-family:'Sora',sans-serif;font-size:1rem;font-weight:700;color:var(--text)}
.card-title{font-family:'Sora',sans-serif;font-size:1.35rem;font-weight:700;letter-spacing:-0.4px;margin-bottom:6px}
.card-sub{font-size:0.82rem;color:var(--muted);margin-bottom:28px;line-height:1.5}
.btn-google{
  width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  background:var(--surface);border:1px solid var(--border2);color:var(--text);
  padding:10px 16px;border-radius:8px;font-size:0.86rem;font-weight:500;
  cursor:pointer;transition:all .18s;font-family:'Inter',sans-serif;margin-bottom:20px;
}
.btn-google:hover{border-color:var(--subtle);background:#1c1c1c}
.btn-google svg{width:18px;height:18px;flex-shrink:0}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:0.72rem;color:var(--muted);letter-spacing:0.05em;white-space:nowrap}
.field{margin-bottom:14px}
.field label{display:block;font-size:0.75rem;font-weight:500;color:var(--muted);margin-bottom:6px;letter-spacing:0.02em}
.field-wrap{position:relative}
.field input{
  width:100%;background:var(--surface);border:1px solid var(--border2);
  color:var(--text);padding:10px 38px 10px 14px;border-radius:8px;
  font-size:0.86rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .18s;
}
.field input::placeholder{color:var(--subtle)}
.field input:focus{border-color:var(--accent)}
.field input.error{border-color:var(--red)}
.field-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none}
.field-icon svg{width:15px;height:15px;stroke:var(--muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);padding:0;display:flex}
.toggle-pw:hover{color:var(--text)}
.toggle-pw svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.error-msg{font-size:0.75rem;color:var(--red);margin-top:5px;display:none}
.error-msg.show{display:block}
.strength-bar{height:3px;border-radius:2px;margin-top:7px;background:var(--border);overflow:hidden}
.strength-fill{height:100%;border-radius:2px;width:0%;transition:width .3s,background .3s}
.strength-label{font-size:0.7rem;color:var(--muted);margin-top:4px}
.btn-auth{
  width:100%;background:var(--accent);border:none;color:#fff;
  padding:11px;border-radius:8px;font-size:0.88rem;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;
  margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 0 0 1px rgba(124,106,247,0.3),0 4px 20px rgba(124,106,247,0.2);
}
.btn-auth:hover{opacity:0.88;transform:translateY(-1px)}
.btn-auth:active{transform:translateY(0)}
.btn-auth:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.terms{font-size:0.72rem;color:var(--muted);margin-top:14px;text-align:center;line-height:1.5}
.terms a{color:var(--accent2);text-decoration:none}
.terms a:hover{text-decoration:underline}
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--card);border:1px solid var(--border2);
  padding:10px 18px;border-radius:8px;font-size:0.82rem;color:var(--text);
  display:flex;align-items:center;gap:8px;
  transition:transform .3s cubic-bezier(.16,1,.3,1);z-index:100;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(52,211,153,0.4)}
.toast.fail{border-color:rgba(248,113,113,0.4)}
.toast-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.toast.success .toast-dot{background:var(--green)}
.toast.fail .toast-dot{background:var(--red)}
.card-footer{margin-top:20px;text-align:center;font-size:0.78rem;color:var(--muted)}
.card-footer a{color:var(--accent2);text-decoration:none;font-weight:500}
.card-footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="bg-glow"></div>

<a class="back-link" href="index.html">
  <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
  Back to home
</a>

<div class="card">
  <a class="logo" href="index.html">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </div>
    <span class="logo-name">StudyAI</span>
  </a>

  <div class="card-title">Create your account</div>
  <div class="card-sub">Free forever. No credit card required.</div>

  <button class="btn-google" id="btnGoogle">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">or sign up with email</span>
    <div class="divider-line"></div>
  </div>

  <div class="field">
    <label>Full name</label>
    <div class="field-wrap">
      <input type="text" id="name" placeholder="Your name" autocomplete="name"/>
      <span class="field-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
    </div>
    <div class="error-msg" id="nameErr">Please enter your name.</div>
  </div>

  <div class="field">
    <label>Email address</label>
    <div class="field-wrap">
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      <span class="field-icon"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
    </div>
    <div class="error-msg" id="emailErr">Please enter a valid email.</div>
  </div>

  <div class="field">
    <label>Password</label>
    <div class="field-wrap">
      <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)"/>
      <button class="toggle-pw" onclick="togglePw()" tabindex="-1" id="toggleBtn">
        <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <div class="strength-label" id="strengthLabel"></div>
    <div class="error-msg" id="pwErr">Password must be at least 8 characters.</div>
  </div>

  <button class="btn-auth" id="btnSignup">
    <span id="btnText">Create free account</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <div class="terms">
    By signing up you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
  </div>

  <div class="card-footer">
    Already have an account? <a href="login.html">Sign in</a>
  </div>
</div>

<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toastMsg"></span>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, updateProfile, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyACPGfrzcwDsnlcBYnBkAYzsdsrv3B4API",
    authDomain: "study-ai-a0086.firebaseapp.com",
    projectId: "study-ai-a0086",
    storageBucket: "study-ai-a0086.firebasestorage.app",
    messagingSenderId: "381337915199",
    appId: "1:381337915199:web:af00a1159ad1baa4c54d8a",
    measurementId: "G-WSPW3PXQ9J"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, user => {
    if (user) window.location.href = 'dashboard.html';
  });

  function setLoading(on) {
    document.getElementById('btnSignup').disabled = on;
    document.getElementById('btnText').style.display = on ? 'none' : 'inline';
    document.getElementById('spinner').style.display = on ? 'block' : 'none';
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.className = 'toast ' + type;
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  function clearErrors() {
    ['name','email','pw'].forEach(id => {
      document.getElementById(id+'Err').classList.remove('show');
    });
    ['name','email','password'].forEach(id => {
      document.getElementById(id).classList.remove('error');
    });
  }

  window.checkStrength = function(val) {
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    if (!val) { fill.style.width='0%'; label.textContent=''; return; }
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const levels = [
      { w:'20%', c:'#f87171', t:'Weak' },
      { w:'45%', c:'#fbbf24', t:'Fair' },
      { w:'70%', c:'#60a5fa', t:'Good' },
      { w:'100%', c:'#34d399', t:'Strong' },
    ];
    const l = levels[score-1] || levels[0];
    fill.style.width = l.w;
    fill.style.background = l.c;
    label.textContent = l.t;
    label.style.color = l.c;
  };

  document.getElementById('btnSignup').addEventListener('click', async () => {
    clearErrors();
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    let valid = true;

    if (!name) {
      document.getElementById('nameErr').classList.add('show');
      document.getElementById('name').classList.add('error');
      valid = false;
    }
    if (!email || !/\S+@\S+\.\S+/.test(email)) {
      document.getElementById('emailErr').classList.add('show');
      document.getElementById('email').classList.add('error');
      valid = false;
    }
    if (password.length < 8) {
      document.getElementById('pwErr').classList.add('show');
      document.getElementById('password').classList.add('error');
      valid = false;
    }
    if (!valid) return;

    setLoading(true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      showToast('Account created! Welcome to StudyAI.', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 900);
    } catch (err) {
      setLoading(false);
      if (err.code === 'auth/email-already-in-use') {
        document.getElementById('emailErr').textContent = 'This email is already registered.';
        document.getElementById('emailErr').classList.add('show');
        document.getElementById('email').classList.add('error');
      } else {
        showToast('Something went wrong. Please try again.', 'fail');
      }
    }
  });

  document.getElementById('btnGoogle').addEventListener('click', async () => {
    const provider = new GoogleAuthProvider();
    try {
      await signInWithPopup(auth, provider);
      showToast('Account created with Google!', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 800);
    } catch (err) {
      showToast('Google sign-in failed. Try again.', 'fail');
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btnSignup').click();
  });

  window.togglePw = function() {
    const inp = document.getElementById('password');
    const btn = document.getElementById('toggleBtn');
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    btn.innerHTML = show
      ? `<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
      : `<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  };
</script>
</body>
</html>
